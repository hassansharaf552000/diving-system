<div class="confirm-overlay" *ngIf="isOpen" (click)="onCancel()">
  <div class="confirm-card" (click)="$event.stopPropagation()">
    <!-- Icon -->
    <div class="icon-wrap" [ngClass]="'theme-' + theme">
      <div class="circle-icon">
        <span class="icon-char" *ngIf="theme === 'danger'">!</span>
        <span class="icon-char" *ngIf="theme === 'primary'">?</span>
        <span class="icon-char" *ngIf="theme === 'warning'">⚠️</span>
        <span class="icon-char" *ngIf="theme === 'success'">✓</span>
      </div>
    </div>

    <!-- Content -->
    <h3 class="confirm-title">{{ title }}</h3>
    <p class="confirm-message">{{ message }}</p>
    <p class="confirm-item" *ngIf="itemName">
      <span class="item-label" [ngClass]="'label-' + theme">{{ itemName }}</span>
    </p>
    <p class="confirm-warning" *ngIf="warningText">{{ warningText }}</p>

    <!-- Buttons -->
    <div class="confirm-actions">
      <button class="btn-cancel" (click)="onCancel()">{{ cancelText }}</button>
      <button class="btn-confirm" [ngClass]="'btn-' + theme" (click)="onConfirm()">
        <span *ngIf="icon">{{ icon }} </span>{{ confirmText }}
      </button>
    </div>
  </div>
</div>

<div class="welcome-section">
  <h2>🌊 Welcome to Dive UP</h2>
  <p>Professional diving center management system for all your operations</p>

  <div class="section-container" *ngIf="currentModule === 'operation'">
    <h3>Operation Module</h3>
    <div class="stats-container">
      <div class="stat-card"
           *ngFor="let stat of operationStats"
           [style.background]="stat.gradient">
        <div class="stat-icon" *ngIf="stat.icon">
          <i [class]="stat.icon"></i>
        </div>
        <div class="stat-info">
          <div class="stat-number">{{ stat.value | number }}</div>
          <div class="stat-label">{{ stat.label }}</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section-container" *ngIf="currentModule === 'accounting'">
    <h3>Accounting Module</h3>
    <div class="stats-container">
      <div class="stat-card"
           *ngFor="let stat of accountingStats"
           [style.background]="stat.gradient">
        <div class="stat-icon" *ngIf="stat.icon">
          <i [class]="stat.icon"></i>
        </div>
        <div class="stat-info">
          <div class="stat-number">{{ stat.value | number }}</div>
          <div class="stat-label">{{ stat.label }}</div>
        </div>
      </div>
    </div>
  </div>
</div>

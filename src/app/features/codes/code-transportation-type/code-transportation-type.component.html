<div class="code-page"><div class="code-card">
  <div class="code-toolbar"><div class="toolbar-left"><button class="back-btn" (click)="goBack()">←</button><h2>🚗 Code Transportation Type</h2><span class="record-count">{{ filtered.length }} records</span></div><div class="toolbar-right"><button class="btn-add" (click)="openAdd()">＋ Add New Type</button></div></div>
  <div class="code-table-wrap"><div class="table-search"><span class="search-icon">🔍</span><input type="text" [(ngModel)]="searchTerm" placeholder="Search types..."></div>
    <table class="code-table"><thead><tr><th>Type Name</th><th>Supplier</th><th>Status</th><th style="width:90px">Actions</th></tr></thead><tbody>
      <tr *ngFor="let item of filtered"><td><strong>{{ item.typeName }}</strong></td><td>{{ item.supplierName }}</td><td><span [class]="item.isActive ? 'status-active' : 'status-inactive'">{{ item.isActive ? 'Active' : 'Inactive' }}</span></td><td><div class="actions-cell"><button class="action-btn edit-btn" (click)="openEdit(item)">✏️</button><button class="action-btn delete-btn" (click)="confirmDelete(item)">🗑️</button></div></td></tr>
      <tr *ngIf="filtered.length === 0"><td colspan="4" class="empty-row">No types found</td></tr></tbody></table>
    <div class="table-footer"><span class="records-info">Showing {{ filtered.length }} of {{ items.length }} records</span>
        <app-export-buttons [data]="filtered" importEndpoint="/api/TransportationTypes/import" [columns]="['typeName','supplierId','isActive']" [lookups]="lookups" resourceName="TransportationTypes" (imported)="loadData()"></app-export-buttons></div></div>
</div>
<app-modal [title]="isEdit ? 'Edit Type' : 'Add New Type'" [isOpen]="isModalOpen" (closed)="closeModal()" size="small">
  <div class="modal-form">
    <div class="form-group"><label>Type Name *</label><input type="text" [(ngModel)]="model.typeName" placeholder="Enter type name"></div>
    <div class="form-group"><label>Supplier</label><select [(ngModel)]="model.supplierId"><option [ngValue]="undefined">Select...</option><option *ngFor="let s of suppliers" [ngValue]="s.id">{{ s.supplierName }}</option></select></div>
    <div class="form-group"><label class="checkbox-label"><input type="checkbox" [(ngModel)]="model.isActive"> Active</label></div>
  </div>
  <div class="modal-footer"><button class="btn-save" (click)="save()" [disabled]="saving">{{ isEdit ? '💾 Update' : '＋ Add' }}</button><button class="btn-cancel-modal" (click)="closeModal()">Cancel</button></div>
</app-modal>
<app-confirm-dialog [isOpen]="showDeleteConfirm" [itemName]="deleteTarget?.typeName || ''" (confirmed)="onDeleteConfirmed()" (cancelled)="onDeleteCancelled()"></app-confirm-dialog></div>

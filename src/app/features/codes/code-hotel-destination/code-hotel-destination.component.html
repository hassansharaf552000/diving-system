<div class="code-page"><div class="code-card">
  <div class="code-toolbar"><div class="toolbar-left"><button class="back-btn" (click)="goBack()">←</button><h2>📍 Code Hotel Destination</h2><span class="record-count">{{ filtered.length }} records</span></div><div class="toolbar-right"><button class="btn-add" (click)="openAdd()">＋ Add New Destination</button></div></div>
  <div class="code-table-wrap"><div class="table-search"><span class="search-icon">🔍</span><input type="text" [(ngModel)]="searchTerm" (ngModelChange)="currentPage = 1" placeholder="Search destinations..."></div>
    <table class="code-table"><thead><tr><th>Destination Name</th><th>Status</th><th style="width:90px">Actions</th></tr></thead><tbody>
      <tr *ngFor="let item of paginatedItems"><td><strong>{{ item.destinationName }}</strong></td><td><span [class]="item.isActive ? 'status-active' : 'status-inactive'">{{ item.isActive ? 'Active' : 'Inactive' }}</span></td><td><div class="actions-cell"><button class="action-btn edit-btn" (click)="openEdit(item)">✏️</button><button class="action-btn delete-btn" (click)="confirmDelete(item)">🗑️</button></div></td></tr>
      <tr *ngIf="filtered.length === 0"><td colspan="3" class="empty-row">No destinations found</td></tr></tbody></table>
    <div class="table-footer"><app-pagination [totalItems]="filtered.length" [currentPage]="currentPage" [pageSize]="pageSize" (pageChange)="onPageChange($event)" (pageSizeChange)="onPageSizeChange($event)"></app-pagination>
        <app-export-buttons [data]="filtered" importEndpoint="/api/HotelDestinations/import" [columns]="['destinationName','isActive']" resourceName="HotelDestinations" (imported)="loadData()"></app-export-buttons></div></div>
</div>
<app-modal [title]="isEdit ? 'Edit Destination' : 'Add New Destination'" [isOpen]="isModalOpen" (closed)="closeModal()" size="small">
  <div class="modal-form"><div class="form-group"><label>Destination Name *</label><input type="text" [(ngModel)]="model.destinationName" placeholder="Enter destination"></div><div class="form-group"><label class="checkbox-label"><input type="checkbox" [(ngModel)]="model.isActive"> Active</label></div></div>
  <div class="modal-footer"><button class="btn-save" (click)="save()" [disabled]="saving">{{ isEdit ? '💾 Update' : '＋ Add' }}</button><button class="btn-cancel-modal" (click)="closeModal()">Cancel</button></div>
</app-modal>
<app-confirm-dialog [isOpen]="showDeleteConfirm" [itemName]="deleteTarget?.destinationName || ''" (confirmed)="onDeleteConfirmed()" (cancelled)="onDeleteCancelled()"></app-confirm-dialog></div>

<div class="code-page">
  <div class="code-card">
    <div class="code-toolbar">
      <div class="toolbar-left"><button class="back-btn" (click)="goBack()">←</button>
        <h2>🏖️ Code Excursion</h2><span class="record-count">{{ filtered.length }} records</span>
      </div>
      <div class="toolbar-right"><button class="btn-add" (click)="openAdd()">＋ Add New Excursion</button></div>
    </div>
    <div class="code-table-wrap">
      <div class="table-search"><span class="search-icon">🔍</span><input type="text" [(ngModel)]="searchTerm"
          (ngModelChange)="currentPage = 1" placeholder="Search excursions..."></div>
      <table class="code-table">
        <thead>
          <tr>
            <th>Excursion Name</th>
            <th>Supplier</th>
            <th>Status</th>
            <th style="width:90px">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of paginatedItems">
            <td><strong>{{ item.excursionName }}</strong></td>
            <td>{{ item.supplierName || getSupplierName(item.supplierId) }}</td>
            <td><span [class]="item.isActive ? 'status-active' : 'status-inactive'">{{ item.isActive ? 'Active' :
                'Inactive' }}</span></td>
            <td>
              <div class="actions-cell"><button class="action-btn edit-btn" (click)="openEdit(item)">✏️</button><button
                  class="action-btn delete-btn" (click)="confirmDelete(item)">🗑️</button></div>
            </td>
          </tr>
          <tr *ngIf="filtered.length === 0">
            <td colspan="4" class="empty-row">No excursions found</td>
          </tr>
        </tbody>
      </table>
      <div class="table-footer"><app-pagination [totalItems]="filtered.length" [currentPage]="currentPage"
          [pageSize]="pageSize" (pageChange)="onPageChange($event)"
          (pageSizeChange)="onPageSizeChange($event)"></app-pagination>
        <app-export-buttons [data]="filtered" importEndpoint="/api/Excursions/import"
          [columns]="['excursionName','supplierName','isActive']" [lookups]="lookups" resourceName="Excursions"
          (imported)="loadData()"></app-export-buttons>
      </div>
    </div>
  </div>
  <app-modal [title]="isEdit ? 'Edit Excursion' : 'Add New Excursion'" [isOpen]="isModalOpen" (closed)="closeModal()"
    size="small">
    <div class="modal-form">
      <div class="form-group"><label>Excursion Name *</label><input type="text" [(ngModel)]="model.excursionName"
          placeholder="Enter name"></div>
      <div class="form-group"><label>Supplier</label><app-searchable-select [(ngModel)]="model.supplierId"
          [items]="suppliers" labelKey="supplierName" valueKey="id"
          placeholder="Search supplier..."></app-searchable-select></div>
      <div class="form-group"><label class="checkbox-label"><input type="checkbox" [(ngModel)]="model.isActive">
          Active</label></div>
    </div>
    <div class="modal-footer"><button class="btn-save" (click)="save()" [disabled]="saving">{{ isEdit ? '💾 Update' : '＋
        Add' }}</button><button class="btn-cancel-modal" (click)="closeModal()">Cancel</button></div>
  </app-modal>
  <app-confirm-dialog [isOpen]="showDeleteConfirm" [itemName]="deleteTarget?.excursionName || ''"
    (confirmed)="onDeleteConfirmed()" (cancelled)="onDeleteCancelled()"></app-confirm-dialog>
</div>

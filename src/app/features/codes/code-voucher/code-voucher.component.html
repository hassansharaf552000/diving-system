<div class="code-page">
  <div class="code-card">
    <div class="code-toolbar">
      <div class="toolbar-left"><button class="back-btn" (click)="goBack()">←</button>
        <h2>🎫 Code Voucher</h2><span class="record-count">{{ filtered.length }} records</span>
      </div>
      <div class="toolbar-right"><button class="btn-add" (click)="openAdd()">＋ Add New Voucher</button></div>
    </div>
    <div class="code-table-wrap">
      <div class="table-search"><span class="search-icon">🔍</span><input type="text" [(ngModel)]="searchTerm"
          (ngModelChange)="currentPage = 1" placeholder="Search vouchers..."></div>
      <table class="code-table">
        <thead>
          <tr>
            <th>Rep</th>
            <th>From Number</th>
            <th>To Number</th>
            <th style="width:90px">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of paginatedItems">
            <td><strong>{{ item.repName || getRepName(item.repId) }}</strong></td>
            <td>{{ item.fromNumber }}</td>
            <td>{{ item.toNumber }}</td>
            <td>
              <div class="actions-cell"><button class="action-btn edit-btn" (click)="openEdit(item)">✏️</button><button
                  class="action-btn delete-btn" (click)="confirmDelete(item)">🗑️</button></div>
            </td>
          </tr>
          <tr *ngIf="filtered.length === 0">
            <td colspan="4" class="empty-row">No vouchers found</td>
          </tr>
        </tbody>
      </table>
      <div class="table-footer"><app-pagination [totalItems]="filtered.length" [currentPage]="currentPage"
          [pageSize]="pageSize" (pageChange)="onPageChange($event)"
          (pageSizeChange)="onPageSizeChange($event)"></app-pagination>
        <app-export-buttons [data]="filtered" importEndpoint="/api/RepVouchers/import"
          [columns]="['repName','fromNumber','toNumber']" [lookups]="lookups" resourceName="RepVouchers"
          (imported)="loadData()"></app-export-buttons>
      </div>
    </div>
  </div>
  <app-modal [title]="isEdit ? 'Edit Voucher' : 'Add New Voucher'" [isOpen]="isModalOpen" (closed)="closeModal()"
    size="small">
    <div class="modal-form">
      <div class="form-group"><label>Rep</label><app-searchable-select [(ngModel)]="model.repId" [items]="reps"
          labelKey="repName" valueKey="id" placeholder="Search rep..."></app-searchable-select></div>
      <div class="form-row">
        <div class="form-group"><label>From Number</label><input type="number" [(ngModel)]="model.fromNumber"
            placeholder="From number"></div>
        <div class="form-group"><label>To Number</label><input type="number" [(ngModel)]="model.toNumber"
            placeholder="To number"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn-save" (click)="save()" [disabled]="saving">{{ isEdit ? '💾 Update' : '＋
        Add' }}</button><button class="btn-cancel-modal" (click)="closeModal()">Cancel</button></div>
  </app-modal>
  <app-confirm-dialog [isOpen]="showDeleteConfirm" [itemName]="'Voucher ' + (deleteTarget?.fromNumber || '')"
    (confirmed)="onDeleteConfirmed()" (cancelled)="onDeleteCancelled()"></app-confirm-dialog>
</div>

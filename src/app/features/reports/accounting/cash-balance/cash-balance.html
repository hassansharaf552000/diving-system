<div class="report-page">
  <div class="report-card">

    <!-- Header -->
    <div class="report-header">
      <div class="header-icon">
        <i class="fas fa-wallet"></i>
      </div>
      <div class="header-text">
        <h2>Cash Balance Report</h2>
        <p>Live snapshot of cash balances across all branches and currencies</p>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="action-buttons">
      <button class="btn-action btn-view" (click)="triggerView()">
        <i class="fas fa-eye"></i>
        <span>View</span>
      </button>
      <button class="btn-action btn-pdf" (click)="triggerPdf()">
        <i class="fas fa-file-pdf"></i>
        <span>PDF</span>
      </button>
      <button class="btn-action btn-excel" (click)="triggerExcel()">
        <i class="fas fa-file-excel"></i>
        <span>Excel</span>
      </button>
    </div>

  </div>
</div>

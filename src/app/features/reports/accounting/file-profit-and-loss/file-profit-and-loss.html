<div class="code-page">
  <div class="code-card search-report-card">
    <div class="code-toolbar">
      <div class="toolbar-left">
        <h2>Touristic File Subsidiary Report</h2>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="code-table-wrap" style="padding: 20px;">
      <div class="filter-form">

        <!-- Row 1: Branch, Year, From Month, To Month -->
        <div class="filter-row">
          <div class="filter-field">
            <label>Branch</label>
            <input type="text" class="filter-input" [(ngModel)]="filters.branch" placeholder="Branch" />
          </div>
          <div class="filter-field">
            <label>Year</label>
            <app-searchable-select [(ngModel)]="filters.year" [items]="yearOptions" [isStatic]="true"></app-searchable-select>
          </div>
          <div class="filter-field">
            <label>From Month</label>
            <app-searchable-select [(ngModel)]="filters.fromMonth" [items]="monthOptions" valueKey="value" labelKey="label"></app-searchable-select>
          </div>
          <div class="filter-field">
            <label>To Month</label>
            <app-searchable-select [(ngModel)]="filters.toMonth" [items]="monthOptions" valueKey="value" labelKey="label"></app-searchable-select>
          </div>
        </div>

        <!-- Row 2: Agent, File Number, Service Account -->
        <div class="filter-row">
          <div class="filter-field">
            <label>Agent</label>
            <app-searchable-select [(ngModel)]="filters.agentId" [items]="agents" valueKey="agentId" labelKey="agentName" nullLabel="-- All --"></app-searchable-select>
          </div>
          <div class="filter-field">
            <label>File Number</label>
            <app-searchable-select [(ngModel)]="filters.fileNumberId" [items]="fileNumbers" valueKey="fileId" labelKey="fileNumber }} - {{ fn" nullLabel="-- All --"></app-searchable-select>
          </div>
          <div class="filter-field">
            <label>Service Account</label>
            <app-searchable-select [(ngModel)]="filters.serviceAccountId" [items]="accounts" valueKey="id" labelKey="accountNumber }} - {{ acc" nullLabel="-- All --"></app-searchable-select>
          </div>
        </div>

        <!-- Row 3: Report By, Report Group -->
        <div class="filter-row">
          <div class="filter-field">
            <label>Report By</label>
            <app-searchable-select [(ngModel)]="filters.reportBy" [items]="reportByOptions" [isStatic]="true"></app-searchable-select>
          </div>
          <div class="filter-field">
            <label>Report Group</label>
            <app-searchable-select [(ngModel)]="filters.reportGroup" [items]="reportGroupOptions" [isStatic]="true"></app-searchable-select>
          </div>
          <!-- spacer fields to keep layout balanced -->
          <div class="filter-field" style="visibility: hidden;"></div>
          <div class="filter-field" style="visibility: hidden;"></div>
        </div>

        <!-- Actions -->
        <div class="filter-actions">
          <button class="btn-view" (click)="triggerPdf()">
            <i class="fas fa-eye"></i> View
          </button>
          <button class="btn-pdf" (click)="downloadPdf()">
            <i class="fas fa-file-pdf"></i> PDF
          </button>
          <button class="btn-excel" (click)="triggerExcel()">
            <i class="fas fa-file-excel"></i> XLS
          </button>
        </div>

      </div>
    </div>

  </div>
</div>

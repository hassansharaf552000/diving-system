<div class="code-page">
  <div class="code-card">
    <div class="code-toolbar">
      <div class="toolbar-left">
        <h2>Treasury Transaction Report</h2>
      </div>
    </div>

    <div class="code-table-wrap" style="padding: 20px;">
      <div class="filter-form">

        <!-- Row 1: fromDate & toDate -->
        <div class="filter-row">
          <div class="filter-field">
            <label>From Date</label>
            <input type="date" class="filter-input" [(ngModel)]="filters.fromDate" />
          </div>
          <div class="filter-field">
            <label>To Date</label>
            <input type="date" class="filter-input" [(ngModel)]="filters.toDate" />
          </div>
        </div>

        <!-- Row 2: Report By & Report Name -->
        <div class="filter-row">
          <div class="filter-field">
            <label>Report By</label>
            <app-searchable-select [(ngModel)]="filters.reportBy" [items]="reportByOptions" valueKey="value" labelKey="label"></app-searchable-select>
          </div>
          <div class="filter-field">
            <label>Report Name</label>
            <app-searchable-select [(ngModel)]="filters.reportName" [items]="reportNameOptions" valueKey="value" labelKey="label"></app-searchable-select>
          </div>
        </div>

        <!-- Row 3: Type & Currency -->
        <div class="filter-row">
          <div class="filter-field">
            <label>Type</label>
            <app-searchable-select [(ngModel)]="filters.type" [items]="transactionTypeOptions" valueKey="value" labelKey="label" nullLabel="-- All Types --"></app-searchable-select>
          </div>
          <div class="filter-field">
            <label>Currency</label>
            <app-searchable-select [(ngModel)]="filters.currency" [items]="currencyOptions" [isStatic]="true" nullLabel="-- All Currencies --"></app-searchable-select>
          </div>
        </div>

        <!-- Row 4: Receipt No & Record By -->
        <div class="filter-row">
          <div class="filter-field">
            <label>Receipt No</label>
            <input type="text" class="filter-input" [(ngModel)]="filters.receiptNo" placeholder="Receipt No" />
          </div>
          <div class="filter-field">
            <label>Record By</label>
            <input type="text" class="filter-input field-disabled" readonly [(ngModel)]="filters.recordBy" placeholder="Record By" />
          </div>
        </div>

        <!-- Action buttons -->
        <div class="filter-actions">
          <button class="btn-view" (click)="triggerView()">
            <i class="fas fa-eye"></i> View
          </button>
          <button class="btn-pdf" (click)="triggerPdf()">
            <i class="fas fa-file-pdf"></i> PDF
          </button>
          <button class="btn-excel" (click)="triggerExcel()">
            <i class="fas fa-file-excel"></i> Excel
          </button>
        </div>

      </div>
    </div>
  </div>
</div>

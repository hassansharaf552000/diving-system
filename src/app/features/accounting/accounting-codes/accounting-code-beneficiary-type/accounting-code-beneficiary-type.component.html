<div class="code-page">
  <div class="code-card">
    <div class="code-toolbar">
      <div class="toolbar-left">
        <button class="back-btn" (click)="goBack()">←</button>
        <h2>🏷️ Beneficiary Types</h2>
        <span class="record-count">{{ filtered.length }} records</span>
      </div>
      <div class="toolbar-right">
        <button class="btn-add" (click)="openAdd()">＋ Add New Type</button>
      </div>
    </div>
    <div class="code-table-wrap">
      <div class="table-search">
        <span class="search-icon">🔍</span>
        <input type="text" [(ngModel)]="searchTerm" (ngModelChange)="currentPage = 1" placeholder="Search types...">
      </div>
      <table class="code-table">
        <thead>
          <tr>
            <th>Type Name</th>
            <th>Status</th>
            <th>Recorded By</th>
            <th>Record Time</th>
            <th style="width:90px">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of paginatedItems">
            <td><strong>{{ item.beneficiaryTypeName }}</strong></td>
            <td>
              <span [class]="item.active ? 'status-active' : 'status-inactive'">
                {{ item.active ? 'Active' : 'Inactive' }}
              </span>
            </td>
            <td>{{ item.recordBy }}</td>
            <td>{{ item.recordTime | date:'yyyy-MM-dd HH:mm' }}</td>
            <td>
              <div class="actions-cell">
                <button class="action-btn edit-btn" (click)="openEdit(item)">✏️</button>
                <button class="action-btn delete-btn" (click)="confirmDelete(item)">🗑️</button>
              </div>
            </td>
          </tr>
          <tr *ngIf="filtered.length === 0">
            <td colspan="5" class="empty-row">No beneficiary types found</td>
          </tr>
        </tbody>
      </table>
      <div class="table-footer">
        <app-pagination [totalItems]="filtered.length" [currentPage]="currentPage" [pageSize]="pageSize" (pageChange)="onPageChange($event)" (pageSizeChange)="onPageSizeChange($event)"></app-pagination>
        <app-export-buttons [data]="filtered" importEndpoint="/api/CodeBeneficiaryTypes/import" [columns]="['beneficiaryTypeName','active']" resourceName="CodeBeneficiaryTypes" (imported)="loadData()"></app-export-buttons>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <app-modal [title]="isEdit ? 'Edit Beneficiary Type' : 'Add New Beneficiary Type'" [isOpen]="isModalOpen" (closed)="closeModal()" size="medium">
    <div class="modal-form">
      <div class="form-row">
        <div class="form-group">
          <label>Type Name *</label>
          <input type="text" [(ngModel)]="model.beneficiaryTypeName" placeholder="Enter beneficiary type name">
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" [(ngModel)]="model.active">
            Active
          </label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-save" (click)="save()" [disabled]="saving">{{ isEdit ? '💾 Update Type' : '＋ Add Type' }}</button>
      <button class="btn-cancel-modal" (click)="closeModal()">Cancel</button>
    </div>
  </app-modal>

  <!-- Delete Confirmation -->
  <app-confirm-dialog
    [isOpen]="showDeleteConfirm"
    [itemName]="deleteTarget?.beneficiaryTypeName || ''"
    (confirmed)="onDeleteConfirmed()"
    (cancelled)="onDeleteCancelled()">
  </app-confirm-dialog>
</div>
